name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-24.04
    permissions:
      contents: write          # commit the coverage badge on a push to main
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install cmake ninja numpy cffi openzl pytest pytest-cov anybadge

      # FULL=ON or libgeozl is missing and geozl.compress cannot run at all.
      - name: Build the library and install geozl
        run: make python FULL=ON

      - name: Run pytest with coverage
        run: |
          python -m pytest bindings/python --cov=geozl --cov-report=term-missing
          # Per file table with the uncovered lines, rendered on the run summary.
          {
            echo "### Coverage $(coverage report --format=total)%"
            echo
            coverage report --format=markdown --show-missing
          } >> "$GITHUB_STEP_SUMMARY"

      # anybadge is pure Python, no pkg_resources, so setuptools removing it does
      # not break the badge like coverage-badge does.
      - name: Generate the coverage badge
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          anybadge --label=coverage --value="$(coverage report --format=total)" \
                   --suffix='%' --file=coverage.svg --overwrite 60=red 80=yellow 100=green

      - name: Commit the coverage badge
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'ci: coverage badge [skip ci]'
          file_pattern: coverage.svg

  sanitize:
    name: Sanitizers
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install cmake ninja numpy cffi openzl pytest

      # Runs the suite against an ASan and UBSan build. A memory or shift fault in
      # a kernel, or a decoder that stops rejecting a forged header, fails here.
      - name: Run the suite under ASan and UBSan
        run: make test-san FULL=OFF

  build:
    name: Strict build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install build tools
        run: python -m pip install --upgrade pip cmake ninja

      # Warnings are errors here, scoped to geozl code only.
      - name: Build the full library and bindings
        run: make build FULL=ON CMAKE_FLAGS=-DGEOZL_WERROR=ON

  isa:
    name: ISA ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: scalar, runner: ubuntu-24.04, cflags: "-DGEOZL_NO_SIMD" }
          - { name: sse2,   runner: ubuntu-24.04, cflags: "-msse2 -mno-avx2" }
          - { name: avx2,   runner: ubuntu-24.04, cflags: "-mavx2" }
          - { name: neon,   runner: macos-15,     cflags: "" }
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install cmake ninja numpy cffi openzl pytest

      # CFLAGS reaches CMAKE_C_FLAGS on the first configure, so each vectorized
      # kernel is built and tested, not just the host default. NEON runs on the
      # macOS arm64 runner, which has an openzl wheel unlike the linux arm one.
      - name: Build and test with the ${{ matrix.name }} kernels
        env:
          CFLAGS: ${{ matrix.cflags }}
        run: make test FULL=OFF