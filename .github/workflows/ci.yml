name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-24.04
    permissions:
      contents: write          # commit the coverage badge on a push to main
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install cmake ninja numpy cffi openzl pytest pytest-cov coverage-badge

      # FULL=OFF builds only the pure C kernels lib the tests dlopen, no OpenZL
      # compile, then installs the binding editable.
      - name: Build the kernels lib and install geozl
        run: make python FULL=OFF

      - name: Run pytest with coverage
        run: |
          python -m pytest bindings/python --cov=geozl --cov-report=term-missing
          echo "### Coverage $(coverage report --format=total)%" >> "$GITHUB_STEP_SUMMARY"

      # Regenerate the badge and commit it, only on a push to main. The message
      # carries [skip ci] so the commit does not trigger this workflow again.
      - name: Update the coverage badge
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          coverage-badge -o coverage.svg -f
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add coverage.svg
          git diff --quiet --staged || {
            git commit -m "ci: coverage badge [skip ci]"
            git push origin HEAD:main
          }