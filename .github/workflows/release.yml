name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:        # build and import the wheels without publishing

permissions:
  contents: read

jobs:
  # The tag must match VERSION, the single source of the wheel version. On a
  # workflow_dispatch there is no tag, so the check is skipped and the build runs
  # as a dry run.
  validate:
    name: Validate tag
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - if: startsWith(github.ref, 'refs/tags/v')
        run: |
          tag="${GITHUB_REF#refs/tags/v}"
          file="$(tr -d '[:space:]' < VERSION)"
          [ "$tag" = "$file" ] || { echo "::error::tag v$tag != VERSION $file"; exit 1; }

  linux:
    name: Wheel linux-x86_64
    needs: validate
    runs-on: ubuntu-24.04
    container: quay.io/pypa/manylinux_2_28_x86_64
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - name: Build and check the wheel
        run: |
          set -euxo pipefail
          export PATH=/opt/python/cp312-cp312/bin:$PATH
          pip install -q cmake ninja build wheel auditwheel
          cmake -S core -B build -G Ninja -DCMAKE_BUILD_TYPE=Release \
                -DGEOZL_BUILD_FULL=ON -DGEOZL_BUILD_KERNELS_SHARED=ON
          cmake --build build
          mkdir -p bindings/python/geozl/_lib
          cp -v build/libgeozl_kernels*.so bindings/python/geozl/_lib/
          cp -v build/libgeozl.so bindings/python/geozl/_lib/
          python -m build --wheel --outdir raw bindings/python
          python -m wheel tags --python-tag py3 --abi-tag none --remove raw/*.whl
          auditwheel repair -w dist raw/*.whl
          python -m venv /tmp/v && . /tmp/v/bin/activate
          pip install dist/*.whl
          LD_LIBRARY_PATH="" python -c "import geozl; print(geozl.__version__)"
          LD_LIBRARY_PATH="" python -c "import numpy as np, geozl; \
            t=(np.arange(256*256,dtype=np.uint16)%97).reshape(256,256); \
            f=geozl.compress(t, method=None); \
            d=geozl.decompress(f, dtype=np.uint16).reshape(t.shape); \
            assert (d == t).all(), 'round-trip mismatch'; \
            print('compress', len(f), 'bytes, round-trip ok')"
      - uses: actions/upload-artifact@v4
        with:
          name: wheel-linux
          path: dist/*.whl
          if-no-files-found: error

  macos:
    name: Wheel macos-arm64
    needs: validate
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build and check the wheel
        run: |
          set -euxo pipefail
          export MACOSX_DEPLOYMENT_TARGET=11.0
          pip install -q --upgrade pip cmake ninja build wheel delocate
          cmake -S core -B build -G Ninja -DCMAKE_BUILD_TYPE=Release \
                -DGEOZL_BUILD_FULL=ON -DGEOZL_BUILD_KERNELS_SHARED=ON
          cmake --build build
          mkdir -p bindings/python/geozl/_lib
          cp -v build/libgeozl_kernels*.dylib bindings/python/geozl/_lib/
          cp -v build/libgeozl.dylib bindings/python/geozl/_lib/
          python -m build --wheel --outdir raw bindings/python
          delocate-wheel -w dist raw/*.whl
          python -m wheel tags --python-tag py3 --abi-tag none \
            --platform-tag macosx_11_0_arm64 --remove dist/*.whl
          python -m venv /tmp/v && . /tmp/v/bin/activate
          pip install dist/*.whl
          python -c "import geozl; print(geozl.__version__)"
          python -c "import numpy as np, geozl; \
            t=(np.arange(256*256,dtype=np.uint16)%97).reshape(256,256); \
            f=geozl.compress(t, method=None); \
            d=geozl.decompress(f, dtype=np.uint16).reshape(t.shape); \
            assert (d == t).all(), 'round-trip mismatch'; \
            print('compress', len(f), 'bytes, round-trip ok')"
      - uses: actions/upload-artifact@v4
        with:
          name: wheel-macos
          path: dist/*.whl
          if-no-files-found: error

  # Only on a tag. Both wheels must have built, so a failed platform blocks the
  # release. Trusted publishing over OIDC, no stored token.
  publish:
    name: Publish
    needs: [linux, macos]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-24.04
    environment: pypi
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheel-*
          path: dist
          merge-multiple: true
      - run: ls -l dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*.whl
          generate_release_notes: true
          prerelease: ${{ contains(github.ref, '-') }}