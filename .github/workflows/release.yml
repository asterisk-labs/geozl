name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:        # build and import the wheels without publishing

permissions:
  contents: read

jobs:
  # The tag must match VERSION, the single source of the wheel version. On a
  # workflow_dispatch there is no tag, so the check is skipped and the build runs
  # as a dry run.
  validate:
    name: Validate tag
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - if: startsWith(github.ref, 'refs/tags/v')
        run: |
          tag="${GITHUB_REF#refs/tags/v}"
          file="$(tr -d '[:space:]' < VERSION)"
          [ "$tag" = "$file" ] || { echo "::error::tag v$tag != VERSION $file"; exit 1; }

  # geozl ships one native artifact, the pure C kernels lib, and it links only
  # libc, so there is nothing to vendor. The wheel is cffi in ABI mode, one
  # py3-none wheel per platform serves every Python 3. Platforms track the openzl
  # wheels on PyPI, today linux x86_64 and macos arm64. FULL=OFF builds the
  # kernels alone, no OpenZL compile, which also keeps a low glibc floor.
  linux:
    name: Wheel linux-x86_64
    needs: validate
    runs-on: ubuntu-24.04
    container: quay.io/pypa/manylinux_2_28_x86_64
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true          # extern/openzl headers only
      - name: Build and check the wheel
        run: |
          set -euxo pipefail
          export PATH=/opt/python/cp312-cp312/bin:$PATH
          pip install -q cmake ninja build wheel auditwheel
          cmake -S core -B build -G Ninja -DCMAKE_BUILD_TYPE=Release \
                -DGEOZL_BUILD_FULL=OFF -DGEOZL_BUILD_KERNELS_SHARED=ON
          cmake --build build
          mkdir -p bindings/python/geozl/_lib
          cp -v build/libgeozl_kernels*.so bindings/python/geozl/_lib/
          python -m build --wheel --outdir raw bindings/python
          python -m wheel tags --python-tag py3 --abi-tag none --remove raw/*.whl
          auditwheel repair -w dist raw/*.whl     # stamps the manylinux tag
          python -m venv /tmp/v && . /tmp/v/bin/activate
          pip install dist/*.whl
          LD_LIBRARY_PATH="" python -c "import geozl; print(geozl.__version__)"
      - uses: actions/upload-artifact@v4
        with:
          name: wheel-linux
          path: dist/*.whl
          if-no-files-found: error

  macos:
    name: Wheel macos-arm64
    needs: validate
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build and check the wheel
        run: |
          set -euxo pipefail
          export MACOSX_DEPLOYMENT_TARGET=11.0    # matches the platform tag below
          pip install -q --upgrade pip cmake ninja build wheel
          cmake -S core -B build -G Ninja -DCMAKE_BUILD_TYPE=Release \
                -DGEOZL_BUILD_FULL=OFF -DGEOZL_BUILD_KERNELS_SHARED=ON
          cmake --build build
          mkdir -p bindings/python/geozl/_lib
          cp -v build/libgeozl_kernels*.dylib bindings/python/geozl/_lib/
          python -m build --wheel --outdir raw bindings/python
          # the dylib links only libSystem, nothing to delocate, tag straight
          python -m wheel tags --python-tag py3 --abi-tag none \
            --platform-tag macosx_11_0_arm64 --remove raw/*.whl
          mkdir dist && mv raw/*.whl dist/
          python -m venv /tmp/v && . /tmp/v/bin/activate
          pip install dist/*.whl
          python -c "import geozl; print(geozl.__version__)"
      - uses: actions/upload-artifact@v4
        with:
          name: wheel-macos
          path: dist/*.whl
          if-no-files-found: error

  # Only on a tag. Both wheels must have built, so a failed platform blocks the
  # release. Trusted publishing over OIDC, no stored token.
  publish:
    name: Publish
    needs: [linux, macos]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-24.04
    environment: pypi
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheel-*
          path: dist
          merge-multiple: true
      - run: ls -l dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*.whl
          generate_release_notes: true
          prerelease: ${{ contains(github.ref, '-') }}