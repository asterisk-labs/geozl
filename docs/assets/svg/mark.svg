<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" role="img" aria-label="geozl">
<style>
  .m-sq{stroke:#16151C;stroke-width:2.4;fill:transparent;animation:m-lh 6s ease-in-out infinite}
  .m-nw{--on:#4A2BE8;animation-delay:0s}
  .m-nn{--on:#F7CC0C;animation-delay:.5s}
  .m-ww{--on:#A9FFA6;animation-delay:1s}
  @keyframes m-lh{0%{fill:transparent}10%{fill:var(--on)}85%{fill:var(--on)}95%{fill:transparent}100%{fill:transparent}}
  .m-tgt{fill:none;stroke:#16151C;stroke-width:2.4}
  .m-pred{fill:transparent;animation:m-pg 6s ease-in-out infinite}
  @keyframes m-pg{0%,48%{fill:transparent}56%,85%{fill:#FE6B37}95%,100%{fill:transparent}}
  .m-arr{stroke:#16151C;animation:m-af 6s ease-in-out infinite}
  @keyframes m-af{0%,33%{opacity:.15}42%,60%{opacity:.9}72%,100%{opacity:.15}}
  @media (prefers-reduced-motion:reduce){
    .m-sq,.m-pred,.m-arr{animation:none}
    .m-nw{fill:#4A2BE8}.m-nn{fill:#F7CC0C}.m-ww{fill:#A9FFA6}.m-pred{fill:#FE6B37}.m-arr{opacity:.9}
  }
</style>
<defs><marker id="mah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<rect class="m-sq m-nw" x="18" y="18" width="44" height="44"/>
<rect class="m-sq m-nn" x="118" y="18" width="44" height="44"/>
<rect class="m-sq m-ww" x="18" y="118" width="44" height="44"/>
<rect class="m-tgt" x="118" y="118" width="44" height="44"/>
<rect class="m-pred" x="132" y="132" width="16" height="16"/>
<line class="m-arr" x1="140" y1="66" x2="140" y2="113" stroke-width="2.6" marker-end="url(#mah)"/>
<line class="m-arr" x1="66" y1="140" x2="113" y2="140" stroke-width="2.6" marker-end="url(#mah)"/>
<line class="m-arr" x1="64" y1="64" x2="112" y2="112" stroke-width="2.6" marker-end="url(#mah)"/>
</svg>
